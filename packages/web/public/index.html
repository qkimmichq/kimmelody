<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <title>Kimmelody — AI 音乐电台</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- 加载遮罩 -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-icon">
        <svg viewBox="0 0 64 64" fill="none" width="64" height="64">
          <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2" opacity="0.3"/>
          <path d="M24 44V22l20-4v22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="42" r="4" fill="currentColor" opacity="0.8"/>
          <circle cx="42" cy="38" r="4" fill="currentColor" opacity="0.8"/>
        </svg>
      </div>
      <h1 class="splash-title">Kimmelody</h1>
      <p class="splash-sub">AI 音乐电台</p>
      <div class="splash-loader"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- 顶部栏 -->
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="topbar-logo">
        <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <path d="M12 22V11l10-2v11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="11" cy="21" r="2.5" fill="currentColor" opacity="0.7"/>
          <circle cx="21" cy="19" r="2.5" fill="currentColor" opacity="0.7"/>
        </svg>
        Kimmelody
      </h1>
      <button id="searchBtn" class="btn-icon" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20">
          <circle cx="11" cy="11" r="7" stroke-width="2"/>
          <path d="M16.5 16.5L21 21" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 搜索弹层 -->
  <div id="searchOverlay" class="search-overlay">
    <div class="search-bar">
      <button id="closeSearchBtn" class="btn-icon" aria-label="关闭搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20">
          <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <input id="searchInput" class="search-input" type="text" placeholder="搜索歌曲、歌手..." autocomplete="off">
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <!-- 主视图 -->
  <main id="mainContent" class="main-content">
    <!-- Radio Chat + Player (Split Layout) -->
    <section id="viewRadio" class="view active">
      <div class="radio-split">
        <!-- Left: Chat Column -->
        <div class="radio-chat-col">
          <!-- 波表动画 -->
          <canvas id="waveCanvas" class="wave-canvas"></canvas>

          <!-- 对话消息区 -->
          <div id="chatMessages" class="chat-messages"></div>

          <!-- 紧凑播放栏（移动端可见，桌面端隐藏） -->
          <div class="radio-player-bar">
            <div class="radio-album-thumb" id="radioAlbumThumb">
              <div class="radio-thumb-fallback">
                <svg viewBox="0 0 64 64" fill="none" width="36" height="36">
                  <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
                  <path d="M24 44V22l20-4v22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="22" cy="42" r="4" fill="currentColor" opacity="0.6"/>
                  <circle cx="42" cy="38" r="4" fill="currentColor" opacity="0.6"/>
                </svg>
              </div>
              <img id="radioAlbumImg" src="" alt="" style="display:none">
            </div>
            <div class="radio-song-meta">
              <div class="radio-song-title" id="radioSongTitle">等待播放...</div>
              <div class="radio-song-artist" id="radioSongArtist">Kimmelody 电台</div>
            </div>
            <div class="radio-actions">
              <button id="radioPlayBtn" class="radio-btn" aria-label="播放/暂停">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24" id="radioPlayIcon">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
              <button id="radioNextBtn" class="radio-btn" aria-label="下一首">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                  <path d="M16 6h2v12h-2zm-3.5 6l-8.5 6V6z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- 对话输入栏 -->
          <div class="chat-input-bar">
            <div class="chat-input-wrap">
              <input id="chatInput" class="chat-input" type="text" placeholder="和 AI DJ 聊天..." autocomplete="off">
            </div>
            <button id="chatSendBtn" class="chat-send-btn" aria-label="发送" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20">
                <path d="M22 2L11 13" stroke-width="2" stroke-linecap="round"/>
                <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Right: Player Column -->
        <div class="radio-player-col">
          <!-- 大号专辑封面 -->
          <div class="player-full">
            <button id="closePlayerBtn" class="btn-icon close-player-btn" aria-label="关闭播放栏">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20">
                <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="album-container">
              <div class="album-placeholder" id="albumArt">
                <svg viewBox="0 0 64 64" fill="none" width="80" height="80">
                  <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
                  <path d="M24 44V22l20-4v22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="22" cy="42" r="4" fill="currentColor" opacity="0.6"/>
                  <circle cx="42" cy="38" r="4" fill="currentColor" opacity="0.6"/>
                </svg>
              </div>
              <div class="record" id="recordDisc">
                <div class="record-hole"></div>
              </div>
            </div>

            <div class="song-info">
              <h2 id="songTitle" class="song-title">等待播放...</h2>
              <p id="songArtist" class="song-artist">Kimmelody 电台</p>
            </div>

            <!-- 播报气泡 -->
            <div id="broadcastBubble" class="broadcast-bubble" style="display:none">
              <div class="bubble-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" stroke-width="1.5"/>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="12" y1="19" x2="12" y2="22" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="bubble-text" id="broadcastText"></div>
            </div>

            <!-- 进度条 -->
            <div class="progress-area">
              <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" step="0.1">
              <div class="time-labels">
                <span id="timeCurrent">0:00</span>
                <span id="timeTotal">0:00</span>
              </div>
            </div>

            <!-- 控制按钮 -->
            <div class="controls">
              <button id="prevBtn" class="btn-control" aria-label="上一首">
                <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
                  <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
              </button>
              <button id="playBtn" class="btn-control btn-play" aria-label="播放/暂停">
                <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32" id="playIcon">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
              <button id="nextBtn" class="btn-control" aria-label="下一首">
                <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
                  <path d="M16 6h2v12h-2zm-3.5 6l-8.5 6V6z"/>
                </svg>
              </button>
            </div>

            <!-- 音量 -->
            <div class="volume-quick">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16">
                <path d="M11 5L6 9H2v6h4l5 4V5z" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <input type="range" id="volumeQuick" class="volume-quick-slider" min="0" max="100" value="80">
              <span id="volumeQuickLabel" class="volume-quick-label">80%</span>
            </div>

            <!-- 歌词 -->
            <div id="lyricsView" class="lyrics-view">
              <p class="lyrics-placeholder">🎵 暂无歌词</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 推荐 -->
    <section id="viewRecommend" class="view">
      <h2 class="view-title">为你推荐</h2>
      <div id="recommendContent">
        <p class="empty-state">加载中...</p>
      </div>
    </section>

    <!-- 队列 -->
    <section id="viewQueue" class="view">
      <h2 class="view-title">播放队列</h2>
      <div id="queueList" class="queue-list">
        <p class="empty-state">队列为空</p>
      </div>
    </section>

    <!-- 今日计划 -->
    <section id="viewTimeline" class="view">
      <h2 class="view-title">今日电台</h2>
      <div id="timelineList" class="timeline-list">
        <p class="empty-state">加载中...</p>
      </div>
    </section>

    <!-- 设置 -->
    <section id="viewSettings" class="view">
      <h2 class="view-title">设置</h2>
      <div class="settings-list">
        <div class="setting-item">
          <div class="setting-label">
            <span class="setting-name">音量</span>
            <span class="setting-desc" id="volumeLabel">80%</span>
          </div>
          <input type="range" id="volumeSlider" class="setting-slider" min="0" max="100" value="80">
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span class="setting-name">播放设备</span>
            <span class="setting-desc" id="deviceLabel">本机扬声器</span>
          </div>
          <button id="deviceListBtn" class="btn-secondary">切换</button>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span class="setting-name">调度规则</span>
          </div>
          <div id="scheduleList" class="schedule-list"></div>
        </div>
        <div class="setting-item">
          <button id="showTasteBtn" class="btn-secondary">查看音乐品味配置</button>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span class="setting-name">连接状态</span>
            <span class="setting-desc" id="connectionStatus">检查中...</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 底部导航 -->
  <nav class="navbar">
    <button class="nav-item active" data-view="viewRadio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22">
        <path d="M12 2a10 10 0 0 0-7.07 17.07l1.41-1.41A8 8 0 0 1 12 4" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M12 6a6 6 0 0 0-4.24 10.24l1.41-1.41A4 4 0 0 1 12 8" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="14" r="3" stroke-width="1.5"/>
        <path d="M12 2v2" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>电台</span>
    </button>
    <button class="nav-item" data-view="viewRecommend">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22">
        <path d="M12 20h9" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke-width="1.5"/>
      </svg>
      <span>推荐</span>
    </button>
    <button class="nav-item" data-view="viewQueue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22">
        <path d="M9 18h12M9 12h12M9 6h12" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="4" cy="6" r="1.5" fill="currentColor"/>
        <circle cx="4" cy="12" r="1.5" fill="currentColor"/>
        <circle cx="4" cy="18" r="1.5" fill="currentColor"/>
      </svg>
      <span>队列</span>
    </button>
    <button class="nav-item" data-view="viewTimeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="1.5"/>
        <path d="M3 10h18" stroke-width="1.5"/>
        <path d="M8 2v4M16 2v4" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>今日节目</span>
    </button>
    <button class="nav-item" data-view="viewSettings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22">
        <circle cx="12" cy="12" r="3" stroke-width="1.5"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="1.5"/>
      </svg>
      <span>设置</span>
    </button>
  </nav>

  <audio id="audioPlayer" preload="auto" crossorigin="anonymous" style="display:none"></audio>
  <script src="/app.js"></script>
</body>
</html>
